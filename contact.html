<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - S'K One Tech Support</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="app.css">
</head>
<body class="bg-gradient-to-br from-gray-950 via-blue-950 to-black text-white">

<!-- Header -->
<header class="bg-black/40 backdrop-blur-md p-5 flex justify-between items-center sticky top-0 z-50">
  <div class="flex items-center space-x-3">
    <img src="logo.png" class="w-12 h-12 rounded-full float">
    <h1 class="text-2xl text-blue-400 font-bold">S'K One Tech Support</h1>
  </div>
  <nav>
    <a href="index.html" class="mx-3 hover:text-blue-400">Home</a>
    <a href="services.html" class="mx-3 hover:text-blue-400">Services</a>
    <a href="projects.html" class="mx-3 hover:text-blue-400">Projects</a>
    <a href="about.html" class="mx-3 hover:text-blue-400">About</a>
    <a href="contact.html" class="mx-3 hover:text-blue-400">Contact</a>
  </nav>
</header>

<!-- Contact Section -->
<section class="py-20 px-6 animate-on-scroll">
  <div class="max-w-4xl mx-auto">
    <h2 class="text-4xl text-blue-400 text-center mb-12 font-bold fade-in">Contact Us</h2>
    
    <div class="grid md:grid-cols-2 gap-12">
      <!-- Contact Info -->
      <div>
        <h3 class="text-2xl font-bold mb-6">Get In Touch</h3>
        <div class="space-y-4">
          <div class="flex items-center">
            <span class="text-2xl mr-4">📞</span>
            <div>
              <p class="font-semibold">Phone</p>
              <p>+91 7678627526</p>
            </div>
          </div>
          <div class="flex items-center">
            <span class="text-2xl mr-4">📧</span>
            <div>
              <p class="font-semibold">Email</p>
              <p>allsolution.1402@gmail.com</p>
            </div>
          </div>
          <div class="flex items-center">
            <span class="text-2xl mr-4">📍</span>
            <div>
              <p class="font-semibold">Service Areas</p>
              <p>Jaipur, Gurugram, Delhi, Noida, Chandigarh, Neemrana</p>
            </div>
          </div>
        </div>

        <div class="mt-8">
          <h4 class="font-bold mb-4">Follow Us</h4>
          <div class="flex space-x-4">
            <a href="https://instagram.com/thekeda.r" target="_blank" class="bg-pink-500 p-3 rounded-full hover:bg-pink-600 transition">
              📷
            </a>
            <a href="https://wa.me/917678627526" target="_blank" class="bg-green-500 p-3 rounded-full hover:bg-green-600 transition">
              💬
            </a>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl">
        <h3 class="text-xl font-bold mb-6">Send us a Message</h3>
        <form id="contactForm" class="space-y-4">
          <div>
            <input type="text" id="name" placeholder="Your Name" required 
                   class="w-full p-3 rounded-lg bg-gray-800 border border-gray-600 focus:border-blue-400 focus:outline-none">
          </div>
          <div>
            <input type="email" id="email" placeholder="Your Email" required 
                   class="w-full p-3 rounded-lg bg-gray-800 border border-gray-600 focus:border-blue-400 focus:outline-none">
          </div>
          <div>
            <input type="tel" id="phone" placeholder="Phone Number (Optional)" 
                   class="w-full p-3 rounded-lg bg-gray-800 border border-gray-600 focus:border-blue-400 focus:outline-none">
          </div>
          <div>
            <select id="inquiryType" class="w-full p-3 rounded-lg bg-gray-800 border border-gray-600 focus:border-blue-400 focus:outline-none">
              <option value="">Select Inquiry Type</option>
              <option value="it-support">IT Support</option>
              <option value="manpower">Manpower Support</option>
              <option value="hiring">Hiring Services</option>
              <option value="consulting">Consulting</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div>
            <textarea id="message" placeholder="Your Message" required rows="4"
                      class="w-full p-3 rounded-lg bg-gray-800 border border-gray-600 focus:border-blue-400 focus:outline-none"></textarea>
          </div>
          <button type="submit" class="w-full bg-blue-600 py-3 rounded-lg hover:bg-blue-700 transition font-semibold">
            Send Message
          </button>
        </form>
        <div id="formMessage" class="mt-4 text-center"></div>
      </div>
    </div>
  </div>
</section>

<!-- Floating WhatsApp -->
<a href="https://wa.me/917678627526" target="_blank" class="fixed bottom-5 right-5 bg-green-500 p-4 rounded-full shadow-lg hover:scale-110 transition">
  💬
</a>

<!-- Footer -->
<footer class="bg-black text-center p-4 text-gray-400">
  <p>© 2026 S'K One Tech Support</p>
</footer>

<script src="index.js"></script>
</body>
</html>
