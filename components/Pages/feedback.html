<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">

<!-- Header -->
<header class="bg-gray-900 p-5 flex justify-between items-center">
  <div class="flex items-center space-x-3">
    <img src="logo.png" class="w-12 h-12 rounded-full">
    <h1 class="text-2xl text-blue-400 font-bold">S'K One Tech Support</h1>
  </div>
  <nav>
    <a href="index.html" class="mx-2">Home</a>
    <a href="services.html" class="mx-2">Services</a>
    <a href="index.html#contact" class="mx-2">Contact</a>
  </nav>
</header>

<div class="text-center p-10">

<h1 class="text-3xl text-blue-400 mb-4">Customer Feedback</h1>

<form action="https://formsubmit.co/allsolution.1402@gmail.com" method="POST" class="grid gap-3 max-w-md mx-auto text-black">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="thankyou.html">

<input type="text" name="name" placeholder="Your Name" required class="p-2">
<input type="email" name="email" placeholder="Your Email" required class="p-2">

<select name="rating" required class="p-2">
<option value="">Rate our service</option>
<option>⭐⭐⭐⭐⭐ Excellent</option>
<option>⭐⭐⭐⭐ Good</option>
<option>⭐⭐⭐ Average</option>
<option>⭐⭐ Poor</option>
</select>

<textarea name="message" placeholder="Your Feedback" required class="p-2"></textarea>

<button class="bg-blue-500 text-white p-2">Submit</button>

</form>

<p class="text-green-400 mt-4">⭐ Your feedback helps us improve</p>

<a href="index.html" class="block mt-4 text-blue-400 underline">Back Home</a>
</div>

</body>
</html>
